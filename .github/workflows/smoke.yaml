name: smoke

# Smoke build: proves the fork + submodule + toolchain compile end-to-end
# without tags or signing secrets (falls back to debug signing).
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # The 3-ABI release build + Go core intermittently exhausts the runner's
      # disk (mergeReleaseNativeLibs: "No space left on device"). Drop unused
      # preinstalled toolchains (~35 GB) before building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY/CodeQL" || true
          sudo docker image prune -af > /dev/null 2>&1 || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28c
          add-to-path: true
          link-to-sdk: true

      # Nothing else caches Gradle: every Android build otherwise re-downloads
      # the ~200 MB gradle-all distribution and the whole AGP/Kotlin dependency
      # graph. restore-keys lets a stale cache seed the run and a fresh one be
      # saved whenever the build files change.
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Build
        run: dart setup.dart android -v

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smoke-android
          path: ./dist
          overwrite: true
          if-no-files-found: error

  # Compiles the windows runner (main.cpp deep-link forwarding) and renders
  # inno_setup.iss — neither is exercised by the android job.
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: |
            core/go.sum

      - name: Enable git long paths
        run: git config --global core.longpaths true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Build
        run: dart setup.dart windows -v

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smoke-windows
          path: ./dist
          overwrite: true
          if-no-files-found: error
